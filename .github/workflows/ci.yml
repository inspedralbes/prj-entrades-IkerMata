# CI: build frontend + tests Laravel (push y PR a main)
name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PHP_VERSION: "8.3"

jobs:
  frontend:
    name: Frontend (Nuxt build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        env:
          NUXT_PUBLIC_API_BASE: http://localhost:8001/api
          NUXT_PUBLIC_GATEWAY_URL: http://localhost:3003
        run: npm ci && npm run build

  backend:
    name: Backend (Composer + PHPUnit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-laravel
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_sqlite, mbstring, intl, bcmath, redis
          coverage: none

      - name: Get Composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('backend-laravel/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Copy env for CI
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate --force

      - name: Run tests
        run: php artisan test
