# CI: build frontend + tests Laravel (push y PR a main)
name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  # Debe coincidir con docker/php/Dockerfile (8.4) y con composer.lock (Symfony 8 → PHP >= 8.4).
  PHP_VERSION: "8.4"

jobs:
  frontend:
    name: Frontend (Nuxt build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        env:
          NUXT_PUBLIC_API_BASE: http://localhost:8001/api
          NUXT_PUBLIC_GATEWAY_URL: http://localhost:3003
          NUXT_TELEMETRY_DISABLED: "1"
          NODE_OPTIONS: --max-old-space-size=6144
        run: npm ci && npm run build

  backend:
    name: Backend (Composer + PHPUnit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-laravel
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          # Sin extensión phpredis: en CI usas Predis + SQLite en memoria (phpunit.xml).
          extensions: mbstring, intl, bcmath, ctype, xml, dom, fileinfo, pdo_sqlite, zip, openssl, curl
          coverage: none

      - name: Copy env for CI (sqlite en memoria; .env.example apunta a pgsql/db que no existe en Actions)
        run: |
          cp .env.example .env
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
          sed -i 's/^DB_DATABASE=.*/DB_DATABASE=:memory:/' .env

      - name: Get Composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('backend-laravel/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Generate app key
        run: php artisan key:generate --force

      - name: Run tests
        run: php artisan test
