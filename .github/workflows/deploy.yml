# Despliegue por SSH (solo push a main). Requiere secretos en el repo.
name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # Si usas otro puerto SSH, cámbialo aquí o añade secret SERVER_PORT y usa un workflow que lo lea.
          port: 22
          command_timeout: 30m
          script: |
            set -e
            cd /opt/tickets
            echo "Deploying ${{ github.sha }}"
            git fetch origin main
            git reset --hard origin/main
            docker compose build --parallel
            docker compose up -d
            docker compose exec -T app composer install --no-interaction --prefer-dist --optimize-autoloader
            docker compose exec -T app php artisan config:clear
            docker compose exec -T app php artisan migrate --force 2>/dev/null || true
            docker compose up -d --force-recreate frontend
            echo "Done."
