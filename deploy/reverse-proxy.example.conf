# Fragment per al Nginx del domini públic (HTTPS). El navegador només parla amb el mateix origen;
# això evita "mixed content" (HTTPS + API HTTP a una altra IP).
#
# Després, al .env de l'arrel del projecte:
#   NUXT_PUBLIC_API_BASE=/api
#   NUXT_PUBLIC_GATEWAY_URL=auto
#
# Reconstrueix el contenidor frontend (docker compose up --build).

location /api/ {
    proxy_pass http://127.0.0.1:8001/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}

location /socket.io/ {
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_pass http://127.0.0.1:3003/socket.io/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}
