services:
  # Nuxt 3 Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ticket-frontend
    ports:
      - "3002:3000"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=development
      - GATEWAY_URL=http://localhost:3003
    networks:
      - ticket-net
    depends_on:
      - gateway

  # Node.js Gateway
  gateway:
    build:
      context: ./backend-node
      dockerfile: Dockerfile
    container_name: ticket-gateway
    ports:
      - "3003:3001"
    volumes:
      - ./backend-node:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=development
      - LARAVEL_API_URL=http://web/api
    networks:
      - ticket-net
    depends_on:
      - web

  # Laravel Application (PHP-FPM)
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ticket-app
    volumes:
      - ./backend-laravel:/var/www
    networks:
      - ticket-net
    depends_on:
      - db

  # Nginx Web Server for Laravel
  web:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: ticket-web
    ports:
      - "8001:80"
    volumes:
      - ./backend-laravel:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - ticket-net
    depends_on:
      - app

  # PostgreSQL Database
  db:
    image: postgres:15
    container_name: ticket-db
    restart: always
    environment:
      - POSTGRES_DB=laravel
      - POSTGRES_USER=laravel
      - POSTGRES_PASSWORD=secret
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./base_de_dades/sql:/docker-entrypoint-initdb.d
    networks:
      - ticket-net

  # Adminer
  adminer:
    image: adminer
    container_name: ticket-adminer
    ports:
      - "8081:8080"
    networks:
      - ticket-net

networks:
  ticket-net:
    driver: bridge

volumes:
  postgres_data:
